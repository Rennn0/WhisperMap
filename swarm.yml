version: '3.8'

services:
  api:
    image: rennn0/xaticraft:latest
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - CERT_PATH=/app/certs/xc-dp.pfx
      - CERT_PASS=SAGhJr6c4sVRcIMhrah9Eddp670jXcl2
    configs:
      - source: xc_pfx
        target: /app/certs/xc-dp.pfx
    secrets:
      - source: xc_appsettings_prod
        target: appsettings.Production.json
    networks:
      - xc-network
      - obs
  
  realtime:
    image: rennn0/realtime:latest
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    secrets:
      - source: rt_appsettings_prod
        target: appsettings.Production.json
    networks:
      - xc-network
  
  postgres:
    image: postgres:16
    secrets:
      - postgres_user
      - postgres_password
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: xc-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - xc-network
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints: [ node.labels.db == true ]

  mongo:
    image: mongodb/mongodb-community-server:8.0-ubi8
    secrets:
      - mongo_user
      - mongo_password
    environment:
      - MONGODB_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongo_user
      - MONGODB_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongo_password
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - xc-network
    ports:
      - target: 27017
        published: 27017
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints: [ node.labels.db == true ]

  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 8070
        protocol: tcp
        mode: ingress
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - xc-network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 64M
          
  grafana:
    image: grafana/grafana:latest
    networks:
      - obs
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    deploy:
      replicas: 1 

  loki:
    image: grafana/loki:latest
    networks:
      - obs
    ports:
      - target: 3100
        published: 3100
        protocol: tcp
        mode: ingress
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - loki_data:/loki
    configs:
      - source: loki_yml
        target: /etc/loki/config.yml
    deploy:
      replicas: 1

  prometheus:
    image: prom/prometheus:latest
    networks:
      - obs
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_yml
        target: /etc/prometheus/prometheus.yml
    deploy:
      replicas: 1

  alloy:
    image: grafana/alloy:latest
    networks:
      - obs
    ports:
      - target: 12345
        published: 12345
        protocol: tcp
        mode: ingress
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global


networks:
  xc-network:
    driver: overlay
  obs:
    driver: overlay
    attachable: true

volumes:
  pgdata:
    external: true
    name: xc_pgdata
  mongo-data:
    external: true
    name: xc_mongo-data
  mongo-config:
    external: true
    name: xc_mongo-config
  grafana_data:
  prometheus_data:
  loki_data:

secrets:
  mongo_password:
    external: true
  mongo_user:
    external: true
  postgres_password:
    external: true
  postgres_user:
    external: true
  xc_appsettings_prod:
    external: true
  rt_appsettings_prod:
    external: true

configs:
  xc_pfx:
    external: true
  nginx_conf:
    file: ./nginx.conf
  prometheus_yml:
    file: ./prometheus.yml
  loki_yml:
    file: ./loki-config.yml
  alloy_config:
    file: ./config.alloy
  grafana_datasources:
    file: ./grafana-datasources.yml