<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    
    <!-- Primary Meta Tags -->
    <title>Xati - Premium Online Marketplace | Shop Quality Products</title>
    <meta name="title" content="Xati - Premium Online Marketplace | Shop Quality Products" />
    <meta name="description" content="Discover premium quality products on Xati marketplace. Browse our curated collection, enjoy secure shopping, and fast delivery. Shop now!" />
    <meta name="keywords" content="xati, online shopping, marketplace, products, quality items, e-commerce" />
    <meta name="author" content="Xati" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xati.org" />
    <meta property="og:title" content="Xati - Premium Online Marketplace | Shop Quality Products" />
    <meta property="og:description" content="Discover premium quality products on Xati marketplace. Browse our curated collection, enjoy secure shopping, and fast delivery." />
    <meta property="og:image" content="https://xati.org/appicon.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Xati" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://xati.org" />
    <meta name="twitter:title" content="Xati - Premium Online Marketplace" />
    <meta name="twitter:description" content="Shop premium quality products on Xati marketplace with secure payment and fast delivery." />
    <meta name="twitter:image" content="https://xati.org/appicon.svg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://xati.org" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/appicon.svg" />
    <link rel="apple-touch-icon" href="/appicon.svg" />
    
    <!-- Sitemap and RSS -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Xati",
      "url": "https://xati.org",
      "logo": "https://xati.org/appicon.svg",
      "description": "Premium online marketplace for quality products",
      "sameAs": [
        "https://www.facebook.com/xati",
        "https://www.instagram.com/xati",
        "https://twitter.com/xati"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["en", "ka", "ru"]
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Xati",
      "url": "https://xati.org",
      "searchAction": {
        "@type": "SearchAction",
        "target": "https://xati.org/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
