worker_processes auto;
worker_shutdown_timeout 30s;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    # -------------------- Core performance --------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 10000;

    # -------------------- Global proxy defaults --------------------
    proxy_http_version      1.1;
    proxy_set_header        Connection "";

    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;

    # Retry logic (VERY important for Swarm churn)
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # -------------------- Docker Swarm DNS --------------------
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # -------------------- Avoid startup crash if upstream missing --------------------
    # Key trick: do NOT resolve at startup
    # Using variables delays DNS resolution until request time

    # -------------------- Error handling --------------------
    proxy_intercept_errors on;

    map $uri $service_label {
        ~^/webhook/   "webhook";
        ~^/realtime/  "realtime";
        default       "api";
    }

    # -------------------- Connection upgrade map (safe default) --------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 reuseport;

        # ==================== WEBHOOK ====================
        location /webhook/ {
            set $upstream "xc-app_webhook:8080";

            proxy_pass http://$upstream;
#             proxy_set_header Host $upstream;

            # Fail fast but retry a bit
            proxy_connect_timeout 3s;

            error_page 502 503 504 = @service_unavailable;
        }

        # ==================== REALTIME (SSE) ====================
        location /realtime/ {
            set $upstream "xc-app_realtime:8080";

            proxy_pass http://$upstream;
#             proxy_set_header Host $upstream;

            # ---- SSE CRITICAL SETTINGS ----
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            chunked_transfer_encoding off;

            # Prevent nginx from closing idle SSE
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;

            # TCP keepalive (helps with dead connections)
            proxy_socket_keepalive on;

            # Disable gzip for SSE (important!)
            gzip off;

            # Avoid retrying mid-stream (important for SSE correctness)
            proxy_next_upstream off;

            error_page 502 503 504 = @service_unavailable;
        }

        # ==================== API ====================
        location / {
            set $upstream "xc-app_api:8080";

            proxy_pass http://$upstream;
#             proxy_set_header Host $upstream;
    
            error_page 502 503 504 = @service_unavailable;
        }

        # ==================== HEALTH CHECK ====================
        location /health {
            return 200 'ok';
        }

        # ==================== FALLBACK ====================
        location @service_unavailable {
            default_type application/json;

            add_header Cache-Control no-store;
            add_header Retry-After 3;

            return 503 '{"error":"service_unavailable","service":"$service_label","path":"$request_uri"}';
        }
    }
}