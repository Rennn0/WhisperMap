worker_processes auto;
worker_shutdown_timeout 30s;

events {
    worker_connections 4096;
}

http {
    upstream api_cluster {
        least_conn;
        server xc_api:8080 max_fails=3 fail_timeout=10s;
    }

    upstream realtime_cluster {
        least_conn;
        server xc_realtime:8080 max_fails=3 fail_timeout=10s;
    }
    
    upstream webhook_cluster {
        least_conn;
        server xc_webhook:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        location /webhook/ {
            proxy_pass http://wenhook_cluster;
            proxy_set_header Host xc_webhook;
        }

        location /realtime/ {
            proxy_pass http://realtime_cluster;
            proxy_http_version 1.1;

            proxy_set_header Host xc_realtime;
            proxy_socket_keepalive on;
        }

        location / {
            proxy_pass http://api_cluster;
            proxy_set_header Host xc_api;
        }
    }
}